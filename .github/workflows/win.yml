name: Build Windows x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest # 使用 Windows 虚拟机

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Binary
        # Windows 下建议开启 vendored 特性处理 openssl，或者项目本身不依赖 openssl
        run: cargo build --target x86_64-pc-windows-msvc --release

      - name: Post-process (Rename)
        run: |
          # Windows 的可执行文件带 .exe 后缀
          ren target\x86_64-pc-windows-msvc\release\david.exe david-windows-x64.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: david-windows
          path: target\x86_64-pc-windows-msvc\release\david-windows-x64.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-pc-windows-msvc/release/david-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
